overrides:
  superstatic>re2: '-'
  '@webgpu/types': '-'
patchedDependencies:
  pixi.js@8.18.1: patches/pixi.js@8.18.1.patch
  react-switch: patches/react-switch.patch
allowBuilds:
  argon2: true
  unrs-resolver: true
  core-js-pure: false

allowUnusedPatches: false
forceLegacyDeploy: true
injectWorkspacePackages: false
minimumReleaseAge: 2880
nodeOptions: --no-warnings=ExperimentalWarning --experimental-vm-modules
strictPeerDependencies: true
updateNotifier: false
verifyDepsBeforeRun: error

packages:
  - pandora-common
  - pandora-server-directory
  - pandora-server-shard
  - pandora-client-web
  - pandora-tests
minimumReleaseAgeExclude:
  # Renovate security update: webpack-dev-server@5.2.5
  - webpack-dev-server@5.2.5
  # Renovate security update: nodemailer@9.0.1
  - nodemailer@9.0.1
